name: lan_transfer
description: 局域网跨平台文件传输工具（Windows/macOS/iOS/Android）
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 设备发现
  multicast_dns: ^0.3.2+6

  # HTTP传输（server+client）
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.1

  # 设备身份持久化
  uuid: ^4.4.0
  shared_preferences: ^2.2.3

  # 文件选择与路径
  file_picker: ^8.0.0+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # 获取本机局域网IP
  network_info_plus: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
